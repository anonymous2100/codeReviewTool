version: "3.9"

services:
  review-bot:
    image: code-review-bot:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: review-bot
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8099}:8099"
    environment:
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.deepseek.com/v1}
      - AI_MODEL=${AI_MODEL:-deepseek-v4-flash}
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - GITLAB_TOKEN=${GITLAB_TOKEN}
      - GITLAB_BASE_URL=${GITLAB_BASE_URL:-https://gitlab.com/api/v4}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8099/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  mysql:
    image: mysql:8.0
    container_name: review-bot-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=reviewbot
      - MYSQL_USER=reviewbot
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    profiles:
      - with-db

volumes:
  mysqldata:
